<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 网格装饰 -->
  <g stroke="#81C784" stroke-width="2" opacity="0.3">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- 蛇身——S形 -->
  <path d="M 120 340 Q 120 280, 170 280 L 290 280 Q 340 280, 340 230 L 340 170 Q 340 120, 390 120 L 440 120"
        stroke="#FFD54F" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 蛇身纹理 -->
  <path d="M 130 340 Q 130 290, 170 290 L 280 290 Q 330 290, 330 240 L 330 180 Q 330 130, 380 130 L 430 130"
        stroke="#FFC107" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 蛇头 -->
  <circle cx="450" cy="120" r="28" fill="#FFA000"/>
  <!-- 蛇眼 -->
  <circle cx="460" cy="112" r="8" fill="white"/>
  <circle cx="462" cy="111" r="4" fill="#333"/>
  <!-- 蛇舌 -->
  <line x1="478" y1="118" x2="500" y2="114" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
  <line x1="478" y1="122" x2="500" y2="126" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
  <!-- 数学符号 -->
  <text x="200" y="180" font-family="Arial,sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle">+</text>
  <text x="310" y="90"  font-family="Arial,sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">-</text>
  <text x="130" y="420" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">×</text>
  <text x="390" y="430" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="white" text-anchor="middle">÷</text>
  <!-- 底部标题 -->
  <text x="256" y="480" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">口算贪吃蛇</text>
</svg>
